<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>비밀번호 찾기 - 완료</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Work+Sans:wght@400;500&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#d0c5af",
              "on-primary-container": "#554300",
              "on-secondary": "#ffffff",
              "secondary": "#5f5e5e",

              "primary-container": "#d4af37",
              "primary-fixed": "#ffe088",

              "surface-tint": "#735c00",

              "inverse-primary": "#e9c349",
              "tertiary-fixed": "#ffe08b",
              "background": "#fbf9f4",

              "primary-fixed-dim": "#e9c349",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#f2f1ec",

              "surface-bright": "#fbf9f4",

              "surface": "#fbf9f4",

              "on-tertiary-fixed": "#241a00",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#4d4635",
              "on-secondary-fixed-variant": "#474747",
              "surface-variant": "#e4e2dd",
              "on-background": "#1b1c19",
              "inverse-surface": "#30312e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Work Sans"],

            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar: Transactional Suppression Rule Applied (Simplified for Focus) -->
<header class="fixed top-0 w-full z-50 bg-[#fbf9f4]/70 dark:bg-[#1b1c19]/70 backdrop-blur-xl">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto">
<div class="text-xl font-black text-[#735c00] dark:text-[#d4af37] tracking-tighter font-headline">
                Win-Way
            </div>
<div class="text-[#4d4635] dark:text-[#d0c5af] font-label text-sm font-medium">
                Step 4 of 4
            </div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-16 pb-12">
<div class="w-full max-w-md">
<!-- Success Illustration & Content -->
<div class="surface-container-lowest bg-white rounded-lg p-10 flex flex-col items-center text-center shadow-[0_20px_40px_rgba(27,28,25,0.04)] relative overflow-hidden">
<!-- Asymmetric Background Accent -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-container/10 rounded-full blur-3xl"></div>
<!-- Success Icon Cluster -->
<div class="relative mb-8">
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg active:scale-95 duration-200 transition-all">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">
                            check_circle
                        </span>
</div>
<div class="absolute -bottom-2 -right-2 w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">
                            celebration
                        </span>
</div>
</div>
<h1 class="font-headline font-bold text-2xl mb-4 text-on-surface tracking-tight">
                    비밀번호 변경 완료!
                </h1>
<p class="font-label text-on-surface-variant leading-relaxed mb-10">
                    새로운 비밀번호로 로그인해 주세요. <br/>
                    안전한 서비스 이용을 위해 주기적인 비밀번호 변경을 권장합니다.
                </p>
<!-- Action Button -->
<a class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 px-8 rounded-full font-label font-bold text-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all duration-200 shadow-lg" href="/login">
<span>로그인 화면으로 이동</span>
<span class="material-symbols-outlined">arrow_forward</span>
</a>
</div>
<!-- Footer Meta Info -->
<div class="mt-8 text-center px-4">
<p class="text-xs text-on-surface-variant/60 font-label">
                    문제가 발생했나요? <a class="text-primary font-bold underline underline-offset-4 decoration-primary-container/30" href="#">고객센터 문의하기</a>
</p>
</div>
</div>
</main>
<!-- Success Toast (Always Visible for this state as requested) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-sm">
<div class="glass-card bg-white/90 border border-outline-variant/15 rounded-full px-6 py-4 flex items-center gap-3 shadow-[0_10px_30px_rgba(27,28,25,0.08)]">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<p class="font-label text-sm font-medium text-on-surface">비밀번호가 성공적으로 변경되었습니다.</p>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary-container/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[10%] right-[5%] w-80 h-80 bg-surface-container-highest/50 rounded-full blur-[120px]"></div>
</div>
</body></html>
