<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>비밀번호 찾기 - 새 비밀번호 설정</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#d0c5af",
              "on-primary-container": "#554300",
              "on-secondary": "#ffffff",
              "secondary": "#5f5e5e",
              "on-secondary-fixed": "#1b1c1c",
              "surface-dim": "#dbdad5",
              "surface-container-highest": "#e4e2dd",
              "surface-container-high": "#eae8e3",
              "secondary-fixed-dim": "#c8c6c5",
              "surface-container-lowest": "#ffffff",
              "outline": "#7f7663",
              "surface-container": "#f0eee9",
              "primary-container": "#d4af37",
              "primary-fixed": "#ffe088",
              "on-tertiary-container": "#554300",
              "surface-tint": "#735c00",
              "secondary-fixed": "#e4e2e1",
              "on-primary-fixed-variant": "#574500",
              "secondary-container": "#e4e2e1",
              "inverse-primary": "#e9c349",
              "tertiary-fixed": "#ffe08b",
              "background": "#fbf9f4",
              "tertiary": "#725c14",
              "tertiary-container": "#cdb061",
              "primary-fixed-dim": "#e9c349",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#f2f1ec",
              "tertiary-fixed-dim": "#e1c472",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "surface-container-low": "#f5f3ee",
              "on-secondary-container": "#656464",
              "surface-bright": "#fbf9f4",
              "on-tertiary-fixed-variant": "#584400",
              "on-primary-fixed": "#241a00",
              "surface": "#fbf9f4",
              "on-surface": "#1b1c19",
              "primary": "#735c00",
              "on-tertiary-fixed": "#241a00",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#4d4635",
              "on-secondary-fixed-variant": "#474747",
              "surface-variant": "#e4e2dd",
              "on-background": "#1b1c19",
              "inverse-surface": "#30312e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Work Sans"],
              "label": ["Noto Sans KR"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar (Transactional - Back action only, no full nav) -->
<header class="fixed top-0 w-full z-50 bg-[#fbf9f4]/70 backdrop-blur-xl shadow-[0_20px_40px_rgba(27,28,25,0.04)]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="text-xl font-black text-[#735c00] tracking-tighter font-headline">Win-Way</div>
<div class="w-6"></div> <!-- Spacer for alignment -->
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-md">
<!-- Header Section -->
<div class="mb-10 text-center">
<h1 class="text-3xl font-bold font-headline text-on-surface tracking-tight mb-2">새 비밀번호 설정</h1>
<p class="text-on-surface-variant font-label text-sm">보안을 위해 강력한 비밀번호를 설정해주세요.</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_20px_40px_rgba(27,28,25,0.04)] border border-outline-variant/10">
<form class="space-y-8">
<!-- Password Input Group -->
<div class="space-y-4">
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant font-label px-1">새 비밀번호</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-DEFAULT py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container transition-all" placeholder="새 비밀번호를 입력하세요" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline/60 cursor-pointer">visibility_off</span>
</div>
<!-- Security Strength Indicator -->
<div class="pt-2 px-1">
<div class="flex gap-1 h-1.5 mb-2">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary-container rounded-full opacity-30"></div>
<div class="flex-1 bg-primary-container rounded-full opacity-30"></div>
</div>
<div class="flex justify-between items-center">
<span class="text-[10px] font-bold text-primary font-label">보안 등급: 보통</span>
<span class="text-[10px] text-on-surface-variant font-label">8자 이상, 숫자, 특수문자 포함</span>
</div>
</div>
</div>
<div class="space-y-2 pt-2">
<label class="block text-xs font-bold text-on-surface-variant font-label px-1">새 비밀번호 확인</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-DEFAULT py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container transition-all" placeholder="비밀번호를 한번 더 입력하세요" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline/60 cursor-pointer">visibility_off</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-4 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-all hover:opacity-90" type="submit">
                        비밀번호 변경하기
                    </button>
</form>
</div>
<!-- Footer Meta -->
<div class="mt-8 text-center space-y-4">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-sm text-primary">verified_user</span>
<span class="text-[11px] font-medium text-on-surface-variant font-label">종단간 암호화로 데이터가 보호됩니다</span>
</div>
</div>
</div>
</main>
<!-- Decorative Elements (Asymmetry Principle) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary-container/10 rounded-full blur-[80px] -z-10"></div>
<div class="fixed top-24 -right-12 w-48 h-48 bg-primary/5 rounded-full blur-[60px] -z-10"></div>
<!-- No BottomNavBar on Transactional Screen -->
</body></html>
