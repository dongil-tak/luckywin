<!DOCTYPE html>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Work Sans', 'Noto Sans KR', sans-serif;
        background-color: #fbf9f4;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fbf9f4]/70 backdrop-blur-xl shadow-[0_20px_40px_rgba(27,28,25,0.04)]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface hover:opacity-80 transition-opacity cursor-pointer" data-icon="menu">menu</span>
<h1 class="text-xl font-black text-[#735c00] tracking-tighter font-headline">Win-Way</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-[#d4af37] text-xs font-bold tracking-tight bg-surface-container-high px-3 py-1 rounded-full">1150th Round</span>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-md">
<!-- Hero Illustration/Abstract Section -->
<div class="mb-10 text-center">
<div class="inline-block p-4 rounded-xl bg-surface-container-low mb-6">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-3xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<h2 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight mb-2">로그인 및 인증</h2>
<p class="text-on-surface-variant font-label text-sm">데이터 기반의 당첨 분석 시스템에 접속하세요</p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest p-8 rounded-lg shadow-[0_20px_40px_rgba(27,28,25,0.04)]">
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant font-headline tracking-widest uppercase ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-sm px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/50" id="email" placeholder="example@winway.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold text-on-surface-variant font-headline tracking-widest uppercase" for="password">Password</label>
<a class="text-xs font-label text-primary font-medium hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-sm px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Toggles and Remember -->
<div class="flex items-center justify-between pt-2">
<div class="flex items-center gap-2">
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" id="remember" type="checkbox"/>
<div class="w-10 h-5 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary-container"></div>
<span class="ml-2 text-sm font-label text-on-surface-variant">Email Remember</span>
</div>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-full font-headline font-bold text-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Login and Start
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Notice & Footer Links -->
<div class="mt-8 text-center space-y-4">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-primary text-sm" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-[11px] font-label text-on-surface-variant leading-none">90일 동안 로그인 상태가 유지됩니다 (공용 기기 주의)</p>
</div>
<div class="pt-4 flex justify-center gap-6">
<a class="text-xs font-label text-outline hover:text-on-surface transition-colors" href="#">회원가입</a>
<div class="w-[1px] h-3 bg-outline-variant self-center"></div>
<a class="text-xs font-label text-outline hover:text-on-surface transition-colors" href="#">고객센터</a>
<div class="w-[1px] h-3 bg-outline-variant self-center"></div>
<a class="text-xs font-label text-outline hover:text-on-surface transition-colors" href="#">이용약관</a>
</div>
</div>
</div>
</main>
<!-- Decorative Background Elements -->
<div class="fixed -z-10 top-0 right-0 w-1/3 h-1/2 bg-gradient-to-bl from-primary/5 to-transparent blur-3xl pointer-events-none"></div>
<div class="fixed -z-10 bottom-0 left-0 w-1/4 h-1/3 bg-gradient-to-tr from-primary-container/10 to-transparent blur-3xl pointer-events-none"></div>

</body></html>
