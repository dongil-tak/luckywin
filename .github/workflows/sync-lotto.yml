name: Auto Sync Lotto Database

on:
  schedule:
    # Runs every Saturday at 22:10 KST (13:10 UTC)
    - cron: '10 13 * * 6'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: npm
          node-version: 20
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Sync Lotto Database
        run: |
          cd frontend
          npm run sync-lotto

      - name: Commit, Push, and Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_0ZuXYw6bPVJEYBkaUeH8gRxTQ0D3
          VERCEL_ORG_ID: team_TavN9JyJsczf7S0D3ik4RmxB
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet frontend/src/data/lottoDB.json; then
            echo "No database changes detected. Skipping commit and deploy."
          else
            echo "New round detected. Committing and pushing..."
            git add frontend/src/data/lottoDB.json
            git commit -m "chore: auto-sync lotto database to latest round [skip ci]"
            git push

            echo "Deploying updated database to Vercel production..."
            npx vercel --prod --yes --token=$VERCEL_TOKEN --cwd=frontend
            echo "Deployment complete. New winning numbers are now live."
          fi
